---
# Smyklot Poll workflow
# Polls PR reactions via smyklot bot for auto-merge
#
# This file is managed by smykla-skalski/.github org sync.
# Do not edit manually - changes will be overwritten.

name: Smyklot Poll

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  poll-reactions:
    name: Poll PR Reactions
    runs-on: ${{ fromJSON(vars.RUNNER_LABEL || '["ubuntu-24.04"]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SMYKLOT_APP_ID }}
          private-key: ${{ secrets.SMYKLOT_APP_PRIVATE_KEY }}

      - name: Poll reactions on open PRs
        uses: smykla-skalski/smyklot@e8e0c9f8b02f5e507df95af7a0b1635bc81df478 # v1.12.0
        with:
          args: poll
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SMYKLOT_CONFIG: ${{ vars.SMYKLOT_CONFIG }}
